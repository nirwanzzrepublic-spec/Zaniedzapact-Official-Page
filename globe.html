<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zaniedzapact Globe</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
}

/* MENU */
#menu {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    z-index: 10;
}

select {
    padding: 8px;
    border-radius: 8px;
    background: #1e293b;
    color: white;
    border: none;
}

/* 🏠 HOME BUTTON */
#homeBtn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: #22c55e;
    color: white;
    padding: 12px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    z-index: 20;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}
</style>

</head>
<body>

<div id="menu">
    🌍 Globe Mode<br><br>

    <select onchange="changeMode(this.value)">
        <option value="earth">Earth</option>
        <option value="alliance">Aliansi Zaniedzapact</option>
    </select>

    <p id="output"></p>
</div>

<!-- 🏠 TOMBOL HOME -->
<div id="homeBtn" onclick="goHome()">🏠</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// 🏠 FUNCTION HOME
function goHome(){
    window.location.href = "index.html";
}

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// CAMERA
const camera = new THREE.PerspectiveCamera(
75, window.innerWidth/window.innerHeight, 0.1, 1000
);
camera.position.z = 3;

// RENDER
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🌍 TEXTURES
const loader = new THREE.TextureLoader();

const textures = {
    earth: loader.load("eath.jpg"),
    alliance: loader.load("earth.png")
};

// 🌍 GLOBE
const geometry = new THREE.SphereGeometry(1, 64, 64);
const material = new THREE.MeshBasicMaterial({ map: textures.earth });
const globe = new THREE.Mesh(geometry, material);
scene.add(globe);

// 💡 LIGHT
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// 🔄 MODE SWITCH
function changeMode(mode){
    let out = document.getElementById("output");

    if(mode === "earth"){
        globe.material.map = textures.earth;
        out.innerText = "🌍 Mode Earth Aktif";
    }

    else if(mode === "alliance"){
        globe.material.map = textures.alliance;
        out.innerText = "🟢 Mode Aliansi Aktif";
    }

    globe.material.needsUpdate = true;
}

// 🔍 ZOOM
window.addEventListener("wheel", e => {
    camera.position.z += e.deltaY * 0.01;

    if (camera.position.z < 1.5) camera.position.z = 1.5;
    if (camera.position.z > 5) camera.position.z = 5;
});

// 📱 PINCH ZOOM
let lastDistance = null;

window.addEventListener("touchmove", e => {
    if (e.touches.length === 2) {
        let dx = e.touches[0].clientX - e.touches[1].clientX;
        let dy = e.touches[0].clientY - e.touches[1].clientY;
        let distance = Math.sqrt(dx*dx + dy*dy);

        if (lastDistance) {
            camera.position.z += (lastDistance - distance) * 0.01;

            if (camera.position.z < 1.5) camera.position.z = 1.5;
            if (camera.position.z > 5) camera.position.z = 5;
        }

        lastDistance = distance;
    }
});

window.addEventListener("touchend", () => lastDistance = null);

// 🖱️ DRAG ROTATE
let isDragging = false;

window.addEventListener("mousedown", () => isDragging = true);
window.addEventListener("mouseup", () => isDragging = false);

window.addEventListener("mousemove", e => {
    if (isDragging) {
        globe.rotation.y += e.movementX * 0.005;
        globe.rotation.x += e.movementY * 0.005;
    }
});

// 📱 TOUCH DRAG
let lastX, lastY;

window.addEventListener("touchmove", e => {
    let t = e.touches[0];

    if (lastX != null) {
        globe.rotation.y += (t.clientX - lastX) * 0.005;
        globe.rotation.x += (t.clientY - lastY) * 0.005;
    }

    lastX = t.clientX;
    lastY = t.clientY;
});

window.addEventListener("touchend", () => {
    lastX = null;
    lastY = null;
});

// 🔄 ANIMATE
function animate(){
    requestAnimationFrame(animate);
    globe.rotation.y += 0.001;
    renderer.render(scene, camera);
}
animate();

// RESPONSIVE
window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>

</body>
</html>
